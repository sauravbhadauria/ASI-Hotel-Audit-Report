<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASI Hotel Digital Audit Report</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00124E;
            --secondary: #003479;
            --accent-1: #F7F8FC;
            --accent-2: #25408F;
            --danger: #dc3545;
            --warning: #ffc107;
            --success: #28a745;
            --gradient-1: linear-gradient(135deg, #00124E 0%, #003479 100%);
            --gradient-2: linear-gradient(135deg, #25408F 0%, #2B4A93 100%);
            --shadow-card: 0 10px 30px rgba(0, 18, 78, 0.15);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f6fa; color: var(--primary); line-height: 1.6; }
        
        /* TOOL MODE - Internal Use */
        .tool-mode {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }
        
        .tool-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: var(--shadow-card);
        }
        
        .tool-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .tool-header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2em;
            color: var(--primary);
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group.full-width {
            grid-column: 1 / -1;
        }
        
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9em;
        }
        
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            font-size: 0.95em;
            font-family: inherit;
        }
        
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .review-input {
            background: #fff9e6;
            border: 2px solid var(--warning);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        
        .ota-row {
            display: grid;
            grid-template-columns: 1fr 2fr auto;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.95em;
        }
        
        .btn-primary {
            background: var(--gradient-1);
            color: white;
            width: 100%;
            margin-top: 20px;
        }
        
        .btn-secondary {
            background: var(--gradient-2);
            color: white;
        }
        
        .btn-danger {
            background: #fee;
            color: var(--danger);
        }
        
        /* REPORT MODE - End User View */
        .report-mode {
            display: none;
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }
        
        .report-mode.active {
            display: block;
        }
        
        .report-header {
            background: var(--gradient-1);
            color: white;
            padding: 50px 40px;
            text-align: center;
        }
        
        .report-header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.2em;
            margin-bottom: 10px;
        }
        
        .report-actions {
            background: var(--accent-1);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e1e8ed;
        }
        
        .report-body {
            padding: 40px;
        }
        
        .section-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-card);
            border-left: 5px solid var(--secondary);
        }
        
        .section-card.danger { border-left-color: var(--danger); }
        .section-card.warning { border-left-color: var(--warning); }
        .section-card.success { border-left-color: var(--success); }
        
        .section-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .section-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            background: var(--gradient-2);
            color: white;
        }
        
        .score-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9em;
        }
        
        .score-poor { background: #f8d7da; color: #721c24; }
        .score-fair { background: #fff3cd; color: #856404; }
        .score-good { background: #d4edda; color: #155724; }
        
        .insight-box {
            background: linear-gradient(135deg, #fff 0%, #f0f4ff 100%);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #e1e8ed;
        }
        
        .insight-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 12px;
            font-size: 1.1em;
        }
        
        .problem-statement {
            color: var(--danger);
            font-weight: 600;
            margin-bottom: 10px;
            padding: 10px;
            background: #fff5f5;
            border-radius: 8px;
            border-left: 3px solid var(--danger);
        }
        
        .solution-box {
            background: var(--gradient-1);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-top: 15px;
        }
        
        .solution-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 1.1em;
        }
        
        .feature-list {
            list-style: none;
            margin-top: 10px;
        }
        
        .feature-list li {
            padding: 8px 0;
            padding-left: 25px;
            position: relative;
        }
        
        .feature-list li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #a8e6cf;
            font-weight: bold;
        }
        
        .review-quote {
            background: #fff9e6;
            border-left: 4px solid var(--warning);
            padding: 15px;
            margin: 15px 0;
            border-radius: 0 8px 8px 0;
            font-style: italic;
            color: #856404;
        }
        
        .operational-tag {
            display: inline-block;
            background: var(--danger);
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .improvement-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        
        .improvement-card {
            background: var(--accent-1);
            padding: 20px;
            border-radius: 12px;
            border-top: 4px solid var(--secondary);
        }
        
        .improvement-card h4 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 1em;
        }
        
        .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e1e8ed;
        }
        
        .metric-label { color: var(--secondary); font-weight: 500; }
        .metric-value { font-weight: 700; }
        
        .action-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        
        .action-table th {
            background: var(--gradient-1);
            color: white;
            padding: 15px;
            text-align: left;
            font-size: 0.9em;
        }
        
        .action-table td {
            padding: 15px;
            border-bottom: 1px solid #e1e8ed;
            vertical-align: top;
        }
        
        .priority-high { color: var(--danger); font-weight: 700; }
        .priority-medium { color: var(--warning); font-weight: 700; }
        .priority-low { color: var(--success); font-weight: 700; }
        
        .cta-section {
            background: var(--gradient-1);
            color: white;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            margin-top: 40px;
        }
        
        .cta-section h3 {
            font-size: 1.5em;
            margin-bottom: 15px;
        }
        
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            text-align: center;
        }
        
        .modal-content h2 {
            color: var(--primary);
            margin-bottom: 20px;
        }
        
        .link-display {
            background: var(--accent-1);
            padding: 15px;
            border-radius: 10px;
            word-break: break-all;
            font-family: monospace;
            margin: 20px 0;
            border: 2px solid var(--secondary);
            font-size: 0.9em;
        }
        
        .hidden { display: none !important; }
        
        @media print {
            .report-actions, .modal-overlay { display: none !important; }
            .section-card { break-inside: avoid; }
        }
    </style>
</head>
<body>

    <!-- ==================== TOOL MODE (Internal) ==================== -->
    <div class="tool-mode" id="toolMode">
        <div class="tool-card">
            <div class="tool-header">
                <h1>🏨 ASI Hotel Audit Tool</h1>
                <p style="color: var(--secondary);">Internal Use - Generate Comprehensive Audit Reports</p>
            </div>
            
            <div class="form-grid">
                <div class="form-group">
                    <label>Hotel Name *</label>
                    <input type="text" id="hotelName" placeholder="Grand Plaza Hotel" required>
                </div>
                
                <div class="form-group">
                    <label>Location *</label>
                    <select id="location" onchange="setCurrency()" required>
                        <option value="">Select</option>
                        <option value="IN">🇮🇳 India (INR)</option>
                        <option value="OTHER">🌍 International (USD)</option>
                    </select>
                </div>
                
                <div class="form-group full-width">
                    <label>Hotel Website URL</label>
                    <input type="url" id="websiteUrl" placeholder="https://www.hotel.com">
                </div>
                
                <div class="form-group full-width">
                    <label>Negative Reviews (Copy-paste 2-3 bad reviews mentioning operations)</label>
                    <div id="reviewContainer">
                        <div class="review-input">
                            <textarea class="review-text" placeholder="Example: 'Staff took 30 mins to check us in, room wasn't ready despite confirmed booking...'"></textarea>
                        </div>
                    </div>
                    <button type="button" class="btn btn-secondary" onclick="addReview()" style="width: auto; margin-top: 10px;">+ Add Another Review</button>
                </div>
                
                <div class="form-group full-width">
                    <label>OTA Platforms</label>
                    <div id="otaContainer"></div>
                    <button type="button" class="btn btn-secondary" onclick="addOta()" style="width: auto; margin-top: 10px;">+ Add OTA</button>
                </div>
            </div>
            
            <button type="button" class="btn btn-primary" onclick="generateReport()">
                Generate Audit Report & Create Share Link
            </button>
        </div>
    </div>

    <!-- ==================== REPORT MODE (End User) ==================== -->
    <div class="report-mode" id="reportMode">
        
        <!-- Report Header -->
        <div class="report-header">
            <h1 id="rptHotelName">Hotel Audit Report</h1>
            <p>Comprehensive Digital & Operational Analysis | <span id="rptDate"></span></p>
        </div>
        
        <!-- Actions -->
        <div class="report-actions">
            <div>
                <div style="font-weight: 600;" id="rptMeta">Report ID: -</div>
                <div style="font-size: 0.9em; color: var(--secondary); margin-top: 5px;">
                    Currency: <span id="rptCurrency" style="font-weight: 700;">USD</span>
                </div>
            </div>
            <button class="btn btn-secondary" onclick="downloadPDF()">⬇️ Download PDF</button>
        </div>
        
        <!-- Report Content -->
        <div class="report-body" id="reportContent">
            <!-- Dynamically generated -->
        </div>
    </div>

    <!-- Share Modal -->
    <div class="modal-overlay" id="shareModal">
        <div class="modal-content">
            <h2>🔗 Report Link Generated</h2>
            <p>Share this link with your prospect. They will see ONLY the report.</p>
            <div class="link-display" id="shareLink">https://...</div>
            <button class="btn btn-primary" onclick="copyLink()" style="margin-bottom: 10px;">📋 Copy Link</button>
            <button class="btn" onclick="closeModal()" style="background: #e1e8ed; color: var(--primary);">Close</button>
        </div>
    </div>

    <script>
        let otaCount = 0;
        let reviewCount = 1;
        let reportData = {};
        let currency = { code: 'USD', symbol: '$' };

        function setCurrency() {
            const loc = document.getElementById('location').value;
            currency = loc === 'IN' ? { code: 'INR', symbol: '₹' } : { code: 'USD', symbol: '$' };
        }

        function addReview() {
            reviewCount++;
            const container = document.getElementById('reviewContainer');
            const div = document.createElement('div');
            div.className = 'review-input';
            div.innerHTML = `
                <textarea class="review-text" placeholder="Paste another negative review..."></textarea>
                <button type="button" onclick="this.parentElement.remove()" style="background: none; border: none; color: var(--danger); cursor: pointer; margin-top: 5px;">Remove</button>
            `;
            container.appendChild(div);
        }

        function addOta() {
            otaCount++;
            const container = document.getElementById('otaContainer');
            const div = document.createElement('div');
            div.className = 'ota-row';
            div.innerHTML = `
                <input type="text" placeholder="OTA Name" class="ota-name">
                <input type="url" placeholder="OTA URL" class="ota-url">
                <button type="button" class="btn btn-danger" onclick="this.parentElement.remove()">✕</button>
            `;
            container.appendChild(div);
        }

        function analyzeReview(reviewText) {
            // Simple keyword analysis for operational issues
            const issues = [];
            const text = reviewText.toLowerCase();
            
            if (text.includes('check') && (text.includes('slow') || text.includes('wait') || text.includes('min') || text.includes('hour'))) {
                issues.push({ type: 'CHECKIN', text: 'Slow check-in/check-out process', severity: 'high' });
            }
            if (text.includes('room') && (text.includes('not ready') || text.includes('dirty') || text.includes('clean'))) {
                issues.push({ type: 'HOUSEKEEPING', text: 'Room readiness & housekeeping issues', severity: 'high' });
            }
            if (text.includes('staff') && (text.includes('rude') || text.includes('unprofessional') || text.includes('untrained'))) {
                issues.push({ type: 'STAFF', text: 'Staff training & service quality', severity: 'medium' });
            }
            if (text.includes('book') && (text.includes('wrong') || text.includes('error') || text.includes('mistake') || text.includes('overbook'))) {
                issues.push({ type: 'RESERVATION', text: 'Reservation management errors', severity: 'high' });
            }
            if (text.includes('payment') || text.includes('bill') || text.includes('charge') || text.includes('invoice')) {
                issues.push({ type: 'BILLING', text: 'Billing & payment processing issues', severity: 'medium' });
            }
            if (text.includes('maintenance') || text.includes('broken') || text.includes('repair') || text.includes('ac') || text.includes('wifi')) {
                issues.push({ type: 'MAINTENANCE', text: 'Maintenance & facility issues', severity: 'medium' });
            }
            if (text.includes('communication') || text.includes('email') || text.includes('call') || text.includes('response')) {
                issues.push({ type: 'COMMUNICATION', text: 'Guest communication gaps', severity: 'medium' });
            }
            
            return issues.length > 0 ? issues : [{ type: 'GENERAL', text: 'Overall service quality concerns', severity: 'medium' }];
        }

        function generateReport() {
            const hotelName = document.getElementById('hotelName').value.trim();
            if (!hotelName) { alert('Enter hotel name'); return; }

            // Collect reviews
            const reviews = [];
            document.querySelectorAll('.review-text').forEach(txt => {
                if (txt.value.trim()) reviews.push(txt.value.trim());
            });

            // Collect OTAs
            const otas = [];
            document.querySelectorAll('.ota-row').forEach(row => {
                const name = row.querySelector('.ota-name').value;
                const url = row.querySelector('.ota-url').value;
                if (name && url) otas.push({ name, url });
            });

            // Build report data
            reportData = {
                hotelName,
                currency,
                location: document.getElementById('location').value,
                hasWebsite: document.getElementById('websiteUrl').value !== '',
                reviews,
                otas,
                date: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }),
                id: 'ASI-' + Math.random().toString(36).substr(2, 9).toUpperCase()
            };

            // Generate shareable link
            const reportJson = btoa(JSON.stringify(reportData));
            const baseUrl = window.location.origin + window.location.pathname;
            const shareUrl = baseUrl + '?report=' + reportJson;
            
            document.getElementById('shareLink').textContent = shareUrl;
            document.getElementById('shareModal').classList.add('active');
        }

        function copyLink() {
            navigator.clipboard.writeText(document.getElementById('shareLink').textContent)
                .then(() => alert('✅ Link copied! Prospect will see clean report only.'));
        }

        function closeModal() {
            document.getElementById('shareModal').classList.remove('active');
            // Preview report in tool mode
            renderReport();
        }

        function renderReport() {
            const data = reportData;
            const curr = data.currency;
            
            // Hide tool, show report
            document.getElementById('toolMode').style.display = 'none';
            document.getElementById('reportMode').classList.add('active');
            
            // Update header
            document.getElementById('rptHotelName').textContent = data.hotelName;
            document.getElementById('rptDate').textContent = data.date;
            document.getElementById('rptMeta').textContent = `Report ID: ${data.id}`;
            document.getElementById('rptCurrency').textContent = curr.code;
            
            let html = '';

            // ===== EXECUTIVE SUMMARY =====
            html += `
                <div class="section-card warning">
                    <div class="section-header">
                        <div class="section-icon">📊</div>
                        <div style="flex: 1;">
                            <h2>Executive Summary</h2>
                            <div style="display: flex; gap: 15px; margin-top: 10px;">
                                <span class="score-badge score-poor">Digital Score: 58/100</span>
                                <span class="score-badge score-fair">Operational Score: 64/100</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="insight-box">
                        <div class="insight-title">🔍 Critical Areas Identified</div>
                        <p>Based on comprehensive analysis of your digital presence and guest feedback, 
                        <strong>3 critical operational inefficiencies</strong> and <strong>2 digital gaps</strong> 
                        are impacting guest satisfaction and direct bookings.</p>
                    </div>
                    
                    <div class="improvement-grid">
                        <div class="improvement-card">
                            <h4>⚡ Immediate Actions</h4>
                            <p style="font-size: 0.9em; color: var(--secondary);">Fix check-in delays, rate parity, mobile responsiveness</p>
                        </div>
                        <div class="improvement-card">
                            <h4>📈 30-Day Goals</h4>
                            <p style="font-size: 0.9em; color: var(--secondary);">Achieve 90% review response rate, implement dynamic pricing</p>
                        </div>
                        <div class="improvement-card">
                            <h4>🎯 90-Day Targets</h4>
                            <p style="font-size: 0.9em; color: var(--secondary);">35% increase in direct bookings, 25% reduction in OTA dependency</p>
                        </div>
                    </div>
                </div>
            `;

            // ===== WEBSITE ANALYSIS (if provided) =====
            if (data.hasWebsite) {
                html += `
                    <div class="section-card danger">
                        <div class="section-header">
                            <div class="section-icon">🌐</div>
                            <div>
                                <h2>Website Performance Analysis</h2>
                                <span class="score-badge score-poor" style="margin-top: 5px;">Poor - Needs Immediate Attention</span>
                            </div>
                        </div>
                        
                        <div class="metric-row">
                            <span class="metric-label">Mobile Page Speed</span>
                            <span class="metric-value" style="color: var(--danger);">4.8s (Target: <2s)</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label">Mobile Responsiveness Score</span>
                            <span class="metric-value" style="color: var(--danger);">42/100 (Poor)</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label">Booking Abandonment Rate</span>
                            <span class="metric-value" style="color: var(--danger);">68% (Industry: 45%)</span>
                        </div>
                        
                        <div class="insight-box">
                            <div class="problem-statement">
                                ❌ PROBLEM: 60% of your traffic is mobile, but your site isn't thumb-friendly. 
                                Booking form has 12 fields (best practice: 6). This causes 68% abandonment.
                            </div>
                            
                            <div style="margin: 15px 0;">
                                <strong>Impact:</strong> Losing <strong>35% of potential direct bookings</strong> due to poor mobile experience.
                            </div>
                            
                            <div class="solution-box">
                                <div class="solution-title">✅ ASI Booking Engine Solution</div>
                                <ul class="feature-list">
                                    <li>Mobile-first design with thumb-friendly navigation</li>
                                    <li>3-click booking completion (vs. your current 8+ clicks)</li>
                                    <li>Auto-fill guest data from previous stays</li>
                                    <li>One-tap payment (Apple Pay, Google Pay, UPI for India)</li>
                                    <li>Progressive Web App - works offline, push notifications</li>
                                </ul>
                                <p style="margin-top: 15px; font-size: 0.95em;">
                                    <strong>Result:</strong> Hotels using ASI see 35-50% reduction in booking abandonment 
                                    and 40% increase in mobile conversions within 60 days.
                                </p>
                            </div>
                        </div>
                    </div>
                `;
            }

            // ===== OPERATIONAL ANALYSIS FROM REVIEWS =====
            if (data.reviews.length > 0) {
                html += `
                    <div class="section-card danger">
                        <div class="section-header">
                            <div class="section-icon">⚠️</div>
                            <div>
                                <h2>Operational Issues from Guest Feedback</h2>
                                <span class="score-badge score-poor" style="margin-top: 5px;">Action Required</span>
                            </div>
                        </div>
                `;
                
                data.reviews.forEach((review, idx) => {
                    const issues = analyzeReview(review);
                    
                    html += `<div class="review-quote">"${review.substring(0, 150)}${review.length > 150 ? '...' : ''}"</div>`;
                    
                    issues.forEach(issue => {
                        html += `
                            <div style="margin: 20px 0; padding: 20px; background: #fff5f5; border-radius: 12px; border-left: 4px solid var(--danger);">
                                <span class="operational-tag">${issue.type}</span>
                                <div style="font-weight: 700; color: var(--danger); margin-bottom: 10px;">
                                    Issue Identified: ${issue.text}
                                </div>
                        `;

        function downloadPDF() {
            const actions = document.querySelector('.report-actions');
            actions.style.display = 'none';
            
            const element = document.getElementById('reportMode');
            const opt = {
                margin: 10,
                filename: `${reportData.hotelName}_Audit_Report.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                actions.style.display = 'flex';
            });
        }

        // Load report from URL if shared

                    reportData = JSON.parse(atob(reportParam));
                    currency = reportData.currency;

            }
