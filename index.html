<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASI Hotel Audit Report Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: 600;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .progress-container {
            display: none;
            margin: 30px 0;
        }

        .progress-bar {
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .status-text {
            text-align: center;
            margin-top: 10px;
            color: #666;
        }

        /* Report Styles */
        .report {
            display: none;
        }

        .report-header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .report-header h2 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .score-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .score-card {
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .score-card.good {
            background: #d1fae5;
            border-left: 5px solid #10b981;
        }

        .score-card.warning {
            background: #fef3c7;
            border-left: 5px solid #f59e0b;
        }

        .score-card.danger {
            background: #fee2e2;
            border-left: 5px solid #ef4444;
        }

        .score-number {
            font-size: 3em;
            font-weight: bold;
            margin: 10px 0;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.5em;
            color: #1e3a8a;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 3px solid #e5e7eb;
        }

        .alert-box {
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .alert-danger {
            background: #fee2e2;
            border-left: 5px solid #ef4444;
        }

        .alert-warning {
            background: #fef3c7;
            border-left: 5px solid #f59e0b;
        }

        .alert-success {
            background: #d1fae5;
            border-left: 5px solid #10b981;
        }

        .asi-box {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            padding: 25px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .asi-box h4 {
            font-size: 1.3em;
            margin-bottom: 15px;
        }

        .asi-box ul {
            list-style: none;
            padding-left: 0;
        }

        .asi-box li {
            padding: 8px 0;
            padding-left: 25px;
            position: relative;
        }

        .asi-box li:before {
            content: "✓";
            position: absolute;
            left: 0;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }

        th {
            background: #1e3a8a;
            color: white;
        }

        tr:nth-child(even) {
            background: #f9fafb;
        }

        .review-card {
            background: #f3f4f6;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #ef4444;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .tag {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            margin-right: 5px;
        }

        .tag-danger {
            background: #fee2e2;
            color: #991b1b;
        }

        .tag-opportunity {
            background: #dbeafe;
            color: #1e40af;
        }

        .download-btn {
            display: inline-block;
            background: #10b981;
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 20px;
        }

        .hidden {
            display: none;
        }

        .ota-checklist {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .ota-item {
            padding: 10px;
            background: #f3f4f6;
            border-radius: 5px;
            display: flex;
            align-items: center;
        }

        .ota-item input[type="checkbox"] {
            width: auto;
            margin-right: 10px;
        }

        @media print {
            .no-print {
                display: none !important;
            }
            .report {
                display: block !important;
            }
            body {
                background: white;
            }
            .card {
                box-shadow: none;
                break-inside: avoid;
            }
        }

        @media (max-width: 768px) {
            .score-grid {
                grid-template-columns: 1fr;
            }
            .ota-checklist {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🏨 ASI Hotel Audit Tool</h1>
            <p>Generate comprehensive digital audit reports with ASI solution recommendations</p>
        </div>

        <!-- Input Form -->
        <div class="card no-print" id="inputForm">
            <h2 style="margin-bottom: 20px; color: #1e3a8a;">Enter Hotel Information</h2>
            
            <div class="input-group">
                <label>Hotel Name *</label>
                <input type="text" id="hotelName" placeholder="e.g., Dorje's Resort & Spa" required>
            </div>

            <div class="input-group">
                <label>Location (City, Country) *</label>
                <input type="text" id="location" placeholder="e.g., Pokhara, Nepal" required>
            </div>

            <div class="input-group">
                <label>Hotel Website URL</label>
                <input type="url" id="websiteUrl" placeholder="https://www.hotelwebsite.com">
            </div>

            <div class="input-group">
                <label>Number of Rooms</label>
                <input type="number" id="roomCount" placeholder="e.g., 25">
            </div>

            <div class="input-group">
                <label>Star Rating</label>
                <select id="starRating">
                    <option value="">Select Rating</option>
                    <option value="3">3 Star</option>
                    <option value="4">4 Star</option>
                    <option value="5">5 Star</option>
                    <option value="boutique">Boutique</option>
                </select>
            </div>

            <div class="input-group">
                <label>Current PMS/Channel Manager (if any)</label>
                <input type="text" id="currentPms" placeholder="e.g., None, or current software name">
            </div>

            <h3 style="margin: 25px 0 15px 0; color: #1e3a8a;">OTA Presence (Check all that apply)</h3>
            <div class="ota-checklist">
                <div class="ota-item"><input type="checkbox" id="ota_booking" checked> <label for="ota_booking" style="margin:0">Booking.com</label></div>
                <div class="ota-item"><input type="checkbox" id="ota_expedia"> <label for="ota_expedia" style="margin:0">Expedia</label></div>
                <div class="ota-item"><input type="checkbox" id="ota_agoda"> <label for="ota_agoda" style="margin:0">Agoda</label></div>
                <div class="ota-item"><input type="checkbox" id="ota_hotels"> <label for="ota_hotels" style="margin:0">Hotels.com</label></div>
                <div class="ota-item"><input type="checkbox" id="ota_trip"> <label for="ota_trip" style="margin:0">Trip.com</label></div>
                <div class="ota-item"><input type="checkbox" id="ota_mmt"> <label for="ota_mmt" style="margin:0">MakeMyTrip</label></div>
                <div class="ota-item"><input type="checkbox" id="ota_goibibo"> <label for="ota_goibibo" style="margin:0">Goibibo</label></div>
                <div class="ota-item"><input type="checkbox" id="ota_airbnb"> <label for="ota_airbnb" style="margin:0">Airbnb</label></div>
            </div>

            <h3 style="margin: 25px 0 15px 0; color: #1e3a8a;">Quick Assessment (Your Observations)</h3>
            
            <div class="input-group">
                <label>Rate Parity Status</label>
                <select id="rateParity">
                    <option value="unknown">Not Sure</option>
                    <option value="good">Same rates across all OTAs</option>
                    <option value="issue">Different rates on different OTAs</option>
                </select>
            </div>

            <div class="input-group">
                <label>Recent Guest Complaints (if any)</label>
                <textarea id="complaints" rows="3" placeholder="Enter any recent complaints about overbooking, rate issues, check-in delays, website problems, etc."></textarea>
            </div>

            <div class="input-group">
                <label>Google Review Rating</label>
                <input type="number" id="googleRating" min="1" max="5" step="0.1" placeholder="e.g., 4.2">
            </div>

            <div class="input-group">
                <label>Number of Google Reviews</label>
                <input type="number" id="googleReviewCount" placeholder="e.g., 143">
            </div>

            <div style="text-align: center; margin-top: 30px;">
                <button class="btn" onclick="generateReport()" id="generateBtn">
                    Generate Audit Report
                </button>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="card progress-container" id="progressContainer">
            <h3 style="text-align: center; margin-bottom: 20px;">Analyzing Hotel Data...</h3>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill">0%</div>
            </div>
            <div class="status-text" id="statusText">Initializing audit...</div>
        </div>

        <!-- Report Output -->
        <div class="report" id="reportOutput">
            <!-- Report content will be injected here -->
        </div>
    </div>

    <script>
        // ASI Solution Database
        const asiSolutions = {
            channelManager: {
                title: "ASI Channel Manager",
                icon: "🔄",
                benefits: [
                    "Real-time inventory synchronization across all OTAs",
                    "Automatic rate parity maintenance with instant alerts",
                    "Prevent overbookings with live availability updates",
                    "Centralized dashboard for all distribution channels",
                    "Commission-free direct booking booster"
                ],
                solves: ["overbooking", "rate parity", "inventory sync", "double booking", "manual updates"]
            },
            pms: {
                title: "ASI PMS (Property Management System)",
                icon: "🏨",
                benefits: [
                    "Automated check-in/check-out processes",
                    "Centralized guest profiles and preferences",
                    "Integrated billing and invoicing system",
                    "Housekeeping and maintenance tracking",
                    "Comprehensive reporting and analytics"
                ],
                solves: ["check-in slow", "front desk", "manual", "billing error", "staff confusion", "paperwork"]
            },
            bookingEngine: {
                title: "ASI Booking Engine",
                icon: "💻",
                benefits: [
                    "Mobile-responsive, 2-second load time",
                    "Built-in promo codes and package builder",
                    "Exit-intent popup with special offers",
                    "Price comparison widget (vs OTAs)",
                    "Secure payment processing with PCI compliance"
                ],
                solves: ["website slow", "mobile problem", "no direct booking", "payment failed", "website error"]
            },
            reputation: {
                title: "ASI Reputation Manager",
                icon: "⭐",
                benefits: [
                    "Unified inbox for all review platforms",
                    "AI-powered response suggestions",
                    "Review monitoring across all channels",
                    "Guest feedback analysis and insights",
                    "Automated review request campaigns"
                ],
                solves: ["bad review", "no response", "reputation", "guest complaint"]
            },
            metasearch: {
                title: "ASI Metasearch Connect",
                icon: "🔍",
                benefits: [
                    "Google Hotel Ads integration",
                    "TripAdvisor Instant Booking setup",
                    "Trivago direct booking connection",
                    "Pay-per-stay model (no upfront cost)",
                    "Increased direct booking visibility"
                ],
                solves: ["metasearch", "google ads", "tripadvisor booking", "visibility"]
            }
        };

        // Generate Report Function
        async function generateReport() {
            const btn = document.getElementById('generateBtn');
            const progressContainer = document.getElementById('progressContainer');
            const progressFill = document.getElementById('progressFill');
            const statusText = document.getElementById('statusText');
            const reportOutput = document.getElementById('reportOutput');

            // Get form values
            const hotelData = {
                name: document.getElementById('hotelName').value,
                location: document.getElementById('location').value,
                website: document.getElementById('websiteUrl').value,
                rooms: document.getElementById('roomCount').value,
                starRating: document.getElementById('starRating').value,
                currentPms: document.getElementById('currentPms').value,
                rateParity: document.getElementById('rateParity').value,
                complaints: document.getElementById('complaints').value,
                googleRating: parseFloat(document.getElementById('googleRating').value) || 0,
                googleReviews: parseInt(document.getElementById('googleReviewCount').value) || 0,
                otas: []
            };

            // Collect checked OTAs
            const otaChecks = ['booking', 'expedia', 'agoda', 'hotels', 'trip', 'mmt', 'goibibo', 'airbnb'];
            otaChecks.forEach(ota => {
                if (document.getElementById(`ota_${ota}`).checked) {
                    hotelData.otas.push(ota);
                }
            });

            // Validation
            if (!hotelData.name || !hotelData.location) {
                alert('Please fill in Hotel Name and Location');
                return;
            }

            // Show progress
            btn.disabled = true;
            progressContainer.style.display = 'block';
            document.getElementById('inputForm').style.display = 'none';

            // Simulate progress steps
            const steps = [
                { progress: 15, text: 'Discovering online presence...' },
                { progress: 30, text: 'Analyzing OTA listings...' },
                { progress: 50, text: 'Checking rate parity...' },
                { progress: 70, text: 'Analyzing reviews and complaints...' },
                { progress: 85, text: 'Generating ASI recommendations...' },
                { progress: 100, text: 'Finalizing report...' }
            ];

            for (let step of steps) {
                await sleep(800);
                progressFill.style.width = step.progress + '%';
                progressFill.textContent = step.progress + '%';
                statusText.textContent = step.text;
            }

            await sleep(500);

            // Generate and show report
            const reportHTML = createReportHTML(hotelData);
            reportOutput.innerHTML = reportHTML;
            reportOutput.style.display = 'block';
            progressContainer.style.display = 'none';

            // Scroll to report
            reportOutput.scrollIntoView({ behavior: 'smooth' });
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function createReportHTML(data) {
            const analysis = analyzeHotel(data);
            const date = new Date().toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });

            return `
                <div class="report-header">
                    <h2>HOTEL DIGITAL AUDIT REPORT</h2>
                    <p style="font-size: 1.3em; margin-top: 10px;">${data.name}</p>
                    <p>${data.location}</p>
                    <p style="margin-top: 15px; opacity: 0.9;">Generated on ${date}</p>
                </div>

                <!-- Executive Summary -->
                <div class="card">
                    <div class="section">
                        <h3 class="section-title">📊 Executive Summary</h3>
                        <div class="score-grid">
                            ${createScoreCards(analysis.scores)}
                        </div>
                        
                        <div class="alert-box ${analysis.overallStatus}">
                            <strong>Overall Status:</strong> ${analysis.overallText}
                        </div>

                        <h4 style="margin-top: 20px; color: #1e3a8a;">Key Findings:</h4>
                        <ul style="margin-left: 20px; line-height: 2;">
                            ${analysis.findings.map(f => `<li>${f}</li>`).join('')}
                        </ul>
                    </div>
                </div>

                <!-- OTA Analysis -->
                <div class="card">
                    <div class="section">
                        <h3 class="section-title">🌐 OTA Analysis</h3>
                        
                        <table>
                            <tr>
                                <th>Platform</th>
                                <th>Status</th>
                                <th>Assessment</th>
                            </tr>
                            ${createOTARows(data, analysis)}
                        </table>

                        ${analysis.rateParityIssue ? `
                            <div class="alert-box alert-danger">
                                <strong>⚠️ Rate Parity Issue Detected</strong><br>
                                Your hotel has inconsistent pricing across OTAs. This can lead to:
                                <ul style="margin-left: 20px; margin-top: 10px;">
                                    <li>OTA penalties and ranking drops</li>
                                    <li>Guest confusion and complaints</li>
                                    <li>Lost revenue from rate undercutting</li>
                                </ul>
                            </div>

                            <div class="asi-box">
                                <h4>🎯 ASI Solution: ${asiSolutions.channelManager.title}</h4>
                                <ul>
                                    ${asiSolutions.channelManager.benefits.map(b => `<li>${b}</li>`).join('')}
                                </ul>
                            </div>
                        ` : `
                            <div class="alert-box alert-success">
                                <strong>✓ Good:</strong> Rate parity appears to be maintained across your OTA channels.
                            </div>
                        `}

                        ${data.otas.length < 5 ? `
                            <div class="alert-box alert-warning" style="margin-top: 15px;">
                                <strong>Recommendation:</strong> You're only on ${data.otas.length} OTAs. Expanding to 6-8 major platforms can increase visibility by 40%.
                            </div>
                        ` : ''}
                    </div>
                </div>

                <!-- Booking Engine Analysis -->
                <div class="card">
                    <div class="section">
                        <h3 class="section-title">💳 Booking Engine Analysis</h3>
                        
                        ${analysis.bookingEngineIssues.length > 0 ? `
                            <div class="alert-box alert-danger">
                                <strong>Issues Identified:</strong>
                                <ul style="margin-left: 20px; margin-top: 10px;">
                                    ${analysis.bookingEngineIssues.map(i => `<li>${i}</li>`).join('')}
                                </ul>
                            </div>

                            <div class="asi-box">
                                <h4>🎯 ASI Solution: ${asiSolutions.bookingEngine.title}</h4>
                                <ul>
                                    ${asiSolutions.bookingEngine.benefits.map(b => `<li>${b}</li>`).join('')}
                                </ul>
                            </div>
                        ` : `
                            <div class="alert-box alert-success">
                                <strong>✓ Good:</strong> Your booking engine appears to be functioning well.
                            </div>
                        `}

                        ${!data.currentPms || data.currentPms.toLowerCase().includes('none') ? `
                            <div class="alert-box alert-warning" style="margin-top: 15px;">
                                <strong>Opportunity:</strong> No PMS detected. Implementing ASI PMS + Booking Engine can increase direct bookings by 25-35%.
                            </div>
                        ` : ''}
                    </div>
                </div>

                <!-- Review Analysis -->
                <div class="card">
                    <div class="section">
                        <h3 class="section-title">⭐ Review Analysis & ASI Opportunities</h3>
                        
                        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px;">
                            <div style="text-align: center; padding: 15px; background: #f3f4f6; border-radius: 10px;">
                                <div style="font-size: 2em; font-weight: bold; color: #1e3a8a;">${data.googleRating || 'N/A'}</div>
                                <div>Google Rating</div>
                            </div>
                            <div style="text-align: center; padding: 15px; background: #f3f4f6; border-radius: 10px;">
                                <div style="font-size: 2em; font-weight: bold; color: #1e3a8a;">${data.googleReviews || 'N/A'}</div>
                                <div>Total Reviews</div>
                            </div>
                            <div style="text-align: center; padding: 15px; background: #f3f4f6; border-radius: 10px;">
                                <div style="font-size: 2em; font-weight: bold; color: ${analysis.reviewStatus === 'good' ? '#10b981' : '#ef4444'};">
                                    ${analysis.reviewStatus === 'good' ? 'Good' : 'Action Needed'}
                                </div>
                                <div>Review Health</div>
                            </div>
                        </div>

                        ${analysis.flaggedReviews.length > 0 ? `
                            <h4 style="color: #1e3a8a; margin-bottom: 15px;">🚨 Reviews Flagged for ASI Solutions:</h4>
                            ${analysis.flaggedReviews.map(review => createReviewCard(review)).join('')}
                        ` : `
                            <div class="alert-box alert-success">
                                <strong>✓ Good:</strong> No major operational complaints detected in reviews.
                            </div>
                        `}

                        ${data.complaints ? `
                            <h4 style="color: #1e3a8a; margin: 20px 0 15px 0;">📝 Recent Complaints Analysis:</h4>
                            <div class="review-card">
                                <p><strong>Your Input:</strong> "${data.complaints}"</p>
                                <div style="margin-top: 10px;">
                                    ${analysis.complaintAnalysis}
                                </div>
                            </div>
                        ` : ''}

                        <div class="asi-box" style="margin-top: 20px;">
                            <h4>🎯 ASI Solution: ${asiSolutions.reputation.title}</h4>
                            <ul>
                                ${asiSolutions.reputation.benefits.map(b => `<li>${b}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                </div>

                <!-- Metasearch Analysis -->
                <div class="card">
                    <div class="section">
                        <h3 class="section-title">🔍 Metasearch Analysis</h3>
                        
                        <div class="alert-box alert-warning">
                            <strong>Status:</strong> Based on our analysis, you may be missing visibility on key metasearch platforms where 75% of guests start their hotel search.
                        </div>

                        <table>
                            <tr>
                                <th>Platform</th>
                                <th>Your Status</th>
                                <th>Impact</th>
                            </tr>
                            <tr>
                                <td>Google Hotel Ads</td>
                                <td style="color: #ef4444;">❌ Not Detected</td>
                                <td>High - 60% of searches start here</td>
                            </tr>
                            <tr>
                                <td>TripAdvisor Instant Booking</td>
                                <td style="color: #ef4444;">❌ Not Detected</td>
                                <td>High - Major booking influence</td>
                            </tr>
                            <tr>

        function analyzeHotel(data) {
            const scores = {};
            const findings = [];
            let overallScore = 0;
            let issueCount = 0;

            // OTA Score
            scores.ota = Math.min(100, data.otas.length * 15);
            if (data.otas.length < 5) {
                findings.push(`Limited OTA presence (${data.otas.length} platforms). Expanding to 6-8 OTAs can increase bookings by 40%.`);
                issueCount++;
            } else {
                scores.ota = 90;
            }

            // Rate Parity Score
            const rateParityIssue = data.rateParity === 'issue';
            scores.rateParity = rateParityIssue ? 40 : 90;
            if (rateParityIssue) {
                findings.push('Rate parity issues detected across OTAs - risk of penalties and ranking drops.');
                issueCount++;
            }

            // Booking Engine Score
            const bookingEngineIssues = [];
            if (!data.website) {
                bookingEngineIssues.push('No website URL provided - direct booking channel missing');
                scores.bookingEngine = 30;
                issueCount++;
            } else {
                scores.bookingEngine = 70;
            }
            if (!data.currentPms || data.currentPms.toLowerCase().includes('none')) {
                bookingEngineIssues.push('No integrated PMS detected - manual operations prone to errors');
                scores.bookingEngine = Math.max(30, scores.bookingEngine - 20);
            }

            // Review Score
            scores.reviews = data.googleRating >= 4.0 ? 85 : data.googleRating >= 3.5 ? 70 : 50;
            if (data.googleRating < 4.0) {
                findings.push(`Google rating (${data.googleRating}) below industry standard (4.2+). Reputation management needed.`);
                issueCount++;
            }

            // Website Score
            scores.website = data.website ? 75 : 30;
            if (!data.website) {
                findings.push('Hotel website not provided - direct booking channel critical for revenue.');
                issueCount++;
            }

            // Metasearch Score
            scores.metasearch = 20; // Default low as we can't detect easily
            findings.push('Metasearch presence (Google Hotel Ads, TripAdvisor) not detected - major visibility opportunity.');

            // Calculate overall
            overallScore = Object.values(scores).reduce((a, b) => a + b, 0) / Object.keys(scores).length;

            // Analyze complaints
            const flaggedReviews = [];
            const complaintText = (data.complaints || '').toLowerCase();
            
            // Check for ASI opportunities in complaints
            if (complaintText.includes('overbook') || complaintText.includes('double book')) {
                flaggedReviews.push({
                    text: data.complaints,
                    category: 'channelManager',
                    severity: 'high',
                    matched: 'overbooking'
                });
            }
            if (complaintText.includes('check-in') || complaintText.includes('front desk') || complaintText.includes('slow')) {
                flaggedReviews.push({
                    text: data.complaints,
                    category: 'pms',
                    severity: 'medium',
                    matched: 'operations'
                });
            }
            if (complaintText.includes('website') || complaintText.includes('book') || complaintText.includes('online')) {
                flaggedReviews.push({
                    text: data.complaints,
                    category: 'bookingEngine',
                    severity: 'high',
                    matched: 'booking issue'
                });
            }

            // Complaint analysis text
            let complaintAnalysis = '';
            if (data.complaints) {
                if (flaggedReviews.length > 0) {
                    complaintAnalysis = `<span class="tag tag-opportunity">ASI ${flaggedReviews[0].category} can resolve this</span>`;
                } else {
                    complaintAnalysis = `<span class="tag tag-warning">General service improvement needed</span>`;
                }
            }

            return {
                scores: {
                    ota: scores.ota,
                    rateParity: scores.rateParity,
                    bookingEngine: scores.bookingEngine,
                    website: scores.website,
                    reviews: scores.reviews,
                    metasearch: scores.metasearch,
                    overall: Math.round(overallScore)
                },
                overallStatus: overallScore >= 70 ? 'alert-success' : overallScore >= 50 ? 'alert-warning' : 'alert-danger',
                overallText: overallScore >= 70 ? 'Your hotel is performing well digitally, with room for optimization.' : 
                            overallScore >= 50 ? 'Several areas need attention to maximize revenue and efficiency.' : 
                            'Critical issues detected. Immediate action recommended.',
                findings: findings,
                rateParityIssue: rateParityIssue,
                bookingEngineIssues: bookingEngineIssues,
                flaggedReviews: flaggedReviews,
                complaintAnalysis: complaintAnalysis,
                reviewStatus: data.googleRating >= 4.0 ? 'good' : 'needs improvement'
            };
        }

        function createScoreCards(scores) {
            const cards = [
                { label: 'OTA Presence', score: scores.ota, key: 'ota' },
                { label: 'Rate Parity', score: scores.rateParity, key: 'rateParity' },
                { label: 'Booking Engine', score: scores.bookingEngine, key: 'bookingEngine' },
                { label: 'Website', score: scores.website, key: 'website' },
                { label: 'Reviews', score: scores.reviews, key: 'reviews' },
                { label: 'Metasearch', score: scores.metasearch, key: 'metasearch' }
            ];

            return cards.map(card => {
                const status = card.score >= 80 ? 'good' : card.score >= 60 ? 'warning' : 'danger';
                return `
                    <div class="score-card ${status}">
                        <div style="font-size: 0.9em; color: #6b7280;">${card.label}</div>
                        <div class="score-number" style="color: ${status === 'good' ? '#059669' : status === 'warning' ? '#d97706' : '#dc2626'};">
                            ${card.score}%
                        </div>
                        <div class="tag tag-${status === 'good' ? 'success' : status === 'warning' ? 'warning' : 'danger'}">
                            ${status === 'good' ? 'Good' : status === 'warning' ? 'Fair' : 'Poor'}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function createOTARows(data, analysis) {
            const otaNames = {
                'booking': 'Booking.com',
                'expedia': 'Expedia',
                'agoda': 'Agoda',
                'hotels': 'Hotels.com',
                'trip': 'Trip.com',
                'mmt': 'MakeMyTrip',
                'goibibo': 'Goibibo',
                'airbnb': 'Airbnb'
            };

            return data.otas.map(ota => {
                const hasIssue = analysis.rateParityIssue && Math.random() > 0.5;
                return `
                    <tr>
                        <td>${otaNames[ota] || ota}</td>
                        <td style="color: ${hasIssue ? '#ef4444' : '#10b981'};">
                            ${hasIssue ? '⚠️ Rate Discrepancy' : '✓ Listed'}
                        </td>
                        <td>${hasIssue ? 'Price mismatch detected' : 'Active and synchronized'}</td>
                    </tr>
                `;
            }).join('');
        }

        function createReviewCard(review) {
            const solution = asiSolutions[review.category];
            return `
                <div class="review-card">
                    <div class="review-header">
                        <span class="tag tag-danger">Issue Detected: ${review.matched}</span>
                        <span style="color: #6b7280;">Severity: ${review.severity}</span>
                    </div>
                    <p style="margin-bottom: 15px; font-style: italic;">"${review.text}"</p>
                    <div style="background: #dbeafe; padding: 15px; border-radius: 8px;">
                        <strong style="color: #1e40af;">🎯 Recommended Solution: ${solution.title}</strong>
                        <ul style="margin-top: 10px; margin-left: 20px;">
                            ${solution.benefits.slice(0, 3).map(b => `<li>${b}</li>`).join('')}
                        </ul>
                    </div>
                </div>
            `;
        }
    </script>
